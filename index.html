<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Grid Basic</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 4 CDN -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-4">

  <h2 class="text-center">Bootstrap Grid Example</h2>

  <!-- Row 1: 2 Columns -->
  <div class="row">
    <div class="col-md-6 bg-primary text-white p-3">
      Column 1 (6)
    </div>
    <div class="col-md-6 bg-success text-white p-3">
      Column 2 (6)
    </div>
  </div>

  <!-- Row 2: 3 Columns -->
  <div class="row mt-3">
    <div class="col-md-4 bg-warning p-3">
      Column 1 (4)
    </div>
    <div class="col-md-4 bg-info text-white p-3">
      Column 2 (4)
    </div>
    <div class="col-md-4 bg-danger text-white p-3">
      Column 3 (4)
    </div>
  </div>

  <!-- Row 3: Unequal Columns -->
  <div class="row mt-3">
    <div class="col-md-3 bg-dark text-white p-3">
      3
    </div>
    <div class="col-md-9 bg-secondary text-white p-3">
      9
    </div>
  </div>

</div>

</body>
</html>
